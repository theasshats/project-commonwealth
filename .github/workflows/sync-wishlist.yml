name: Sync wishlist

on:
  push:
    branches: [main]
    paths: ['wishlist.txt']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up packwiz
        uses: ./.github/actions/setup-packwiz

      - name: Sync mods to match wishlist
        id: sync
        run: |
          if [[ ! -f wishlist.txt ]]; then
              echo "No wishlist.txt found, nothing to sync"
              exit 0
          fi

          added=()
          fulfilled=()       # already in mods/, treated as no-op (cleared from file)
          failed=()
          malformed=()
          failures_block=""  # gets appended to bottom of wishlist if non-empty

          # The wishlist has two parts:
          #   1. Header (lines starting with # at the top, before any non-comment line)
          #   2. Entries (everything after)
          # We preserve the header verbatim, drop processed entries, and re-append
          # failures at the bottom under a marker.
          #
          # The header ends at the first non-comment, non-blank line OR at the
          # "Add new mods below this line" sentinel if present.

          header=""
          in_header=true

          while IFS= read -r raw_line || [[ -n "$raw_line" ]]; do
              if $in_header; then
                  # Sentinel: anything after "Add new mods below" is entries
                  if [[ "$raw_line" == *"Add new mods below"* ]]; then
                      header+="$raw_line"$'\n'
                      in_header=false
                      continue
                  fi
                  # Header is comment lines or blank lines until first non-comment
                  if [[ -z "$raw_line" ]] || [[ "$raw_line" =~ ^[[:space:]]*# ]]; then
                      header+="$raw_line"$'\n'
                      continue
                  fi
                  # First real entry; switch to entry mode and reprocess this line
                  in_header=false
              fi

              # Skip blank lines and comments in the entries section
              if [[ -z "$raw_line" ]] || [[ "$raw_line" =~ ^[[:space:]]*# ]]; then
                  continue
              fi

              # Strip inline comments + whitespace
              line="$(echo "$raw_line" | sed 's/#.*//' | xargs)"
              [[ -z "$line" ]] && continue

              # Parse source:slug or source:slug:side
              source="$(echo "$line" | awk -F: '{print $1}')"
              slug="$(echo "$line" | awk -F: '{print $2}')"
              side="$(echo "$line" | awk -F: '{print $3}')"
              [[ -z "$side" ]] && side="both"

              if [[ -z "$source" || -z "$slug" ]]; then
                  malformed+=("$raw_line")
                  failures_block+="# malformed: $raw_line"$'\n'
                  continue
              fi
              case "$source" in
                  mr|cf) ;;
                  *)
                      malformed+=("$raw_line (unknown source '$source')")
                      failures_block+="# malformed (bad source '$source'): $raw_line"$'\n'
                      continue
                      ;;
              esac
              case "$side" in
                  both|client|server) ;;
                  *)
                      malformed+=("$raw_line (unknown side '$side')")
                      failures_block+="# malformed (bad side '$side'): $raw_line"$'\n'
                      continue
                      ;;
              esac

              # Already installed -> silently fulfilled, line gets dropped
              if ls "mods/${slug}.pw.toml" >/dev/null 2>&1; then
                  fulfilled+=("$slug")
                  continue
              fi

              # Try to add
              echo ""
              echo "==> $source:$slug (side=$side)"
              if packwiz "$source" add "$slug" --yes 2>&1; then
                  if ls "mods/${slug}.pw.toml" >/dev/null 2>&1; then
                      if [[ "$side" != "both" ]]; then
                          sed -i "s/^side = \".*\"/side = \"${side}\"/" "mods/${slug}.pw.toml"
                      fi
                      added+=("$slug")
                  else
                      failed+=("$slug (packwiz returned success but no manifest)")
                      failures_block+="# failed (no manifest after add): $line"$'\n'
                  fi
              else
                  failed+=("$slug")
                  failures_block+="# failed: $line"$'\n'
              fi
          done < wishlist.txt

          # Reconstruct the file: header + (failures appended only if any)
          {
              printf '%s' "$header"
              if [[ -n "$failures_block" ]]; then
                  echo ""
                  echo "# === Failed entries (review these) ==="
                  printf '%s' "$failures_block"
              fi
          } > wishlist.txt

          echo ""
          echo "========================================"
          echo "Summary"
          echo "========================================"
          echo "Added       (${#added[@]}): ${added[*]:-none}"
          echo "Fulfilled   (${#fulfilled[@]}): ${fulfilled[*]:-none}    (already installed; cleared)"
          echo "Failed      (${#failed[@]}): ${failed[*]:-none}"
          echo "Malformed   (${#malformed[@]}): ${malformed[*]:-none}"

          {
              echo "added<<EOF"
              for s in "${added[@]}"; do echo "  - $s"; done
              echo "EOF"
              echo "failed<<EOF"
              for s in "${failed[@]}"; do echo "  - $s"; done
              echo "EOF"
              echo "added_count=${#added[@]}"
              echo "fulfilled_count=${#fulfilled[@]}"
              echo "failed_count=${#failed[@]}"
              echo "malformed_count=${#malformed[@]}"
          } >> "$GITHUB_OUTPUT"

          if [[ ${#added[@]} -gt 0 ]]; then
              packwiz refresh
          fi

      - name: Commit and push
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git add mods/ index.toml wishlist.txt
          if git diff --cached --quiet; then
              echo "No staged changes"
              exit 0
          fi

          msg="Sync wishlist"
          if [[ "${{ steps.sync.outputs.added_count }}" != "0" ]]; then
              msg="$msg: add ${{ steps.sync.outputs.added_count }} mod(s)"
          elif [[ "${{ steps.sync.outputs.fulfilled_count }}" != "0" ]]; then
              msg="$msg: clear already-installed entries"
          fi

          git commit -m "$msg

          Added (${{ steps.sync.outputs.added_count }}):
          ${{ steps.sync.outputs.added }}

          Failed (${{ steps.sync.outputs.failed_count }}):
          ${{ steps.sync.outputs.failed }}

          Triggered by ${{ github.actor }}."
          git push

      - name: Fail run if any failures
        if: steps.sync.outputs.failed_count != '0' || steps.sync.outputs.malformed_count != '0'
        run: |
          echo "::error::Sync had failures or malformed lines. See log above and check wishlist.txt for review section at bottom."
          exit 1
