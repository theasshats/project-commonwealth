name: Sync wishlist

on:
  push:
    branches: [main]
    paths: ['wishlist.txt']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up packwiz
        uses: ./.github/actions/setup-packwiz

      - name: Sync mods to match wishlist
        id: sync
        run: |
          if [[ ! -f wishlist.txt ]]; then
              echo "No wishlist.txt found, nothing to sync"
              exit 0
          fi

          added=()
          skipped=()
          failed=()
          malformed=()

          while IFS= read -r raw_line || [[ -n "$raw_line" ]]; do
              # Strip comments + whitespace
              line="$(echo "$raw_line" | sed 's/#.*//' | xargs)"
              [[ -z "$line" ]] && continue

              # Parse source:slug or source:slug:side
              # Use awk to split on colons
              source="$(echo "$line" | awk -F: '{print $1}')"
              slug="$(echo "$line" | awk -F: '{print $2}')"
              side="$(echo "$line" | awk -F: '{print $3}')"
              [[ -z "$side" ]] && side="both"

              # Validate
              if [[ -z "$source" || -z "$slug" ]]; then
                  malformed+=("$line")
                  continue
              fi
              case "$source" in
                  mr|cf) ;;
                  *) malformed+=("$line (unknown source '$source', must be 'mr' or 'cf')"); continue ;;
              esac
              case "$side" in
                  both|client|server) ;;
                  *) malformed+=("$line (unknown side '$side', must be both/client/server)"); continue ;;
              esac

              # Skip if already present
              if ls "mods/${slug}.pw.toml" >/dev/null 2>&1; then
                  skipped+=("$slug (already present)")
                  continue
              fi

              # Add it
              echo ""
              echo "==> $source:$slug (side=$side)"
              if packwiz "$source" add "$slug" --yes 2>&1; then
                  if ls "mods/${slug}.pw.toml" >/dev/null 2>&1; then
                      if [[ "$side" != "both" ]]; then
                          sed -i "s/^side = \".*\"/side = \"${side}\"/" "mods/${slug}.pw.toml"
                      fi
                      added+=("$slug")
                  else
                      failed+=("$slug (packwiz returned success but no manifest file)")
                  fi
              else
                  failed+=("$slug")
              fi
          done < wishlist.txt

          echo ""
          echo "========================================"
          echo "Summary"
          echo "========================================"
          echo "Added     (${#added[@]}): ${added[*]:-none}"
          echo "Skipped   (${#skipped[@]}): ${skipped[*]:-none}"
          echo "Failed    (${#failed[@]}): ${failed[*]:-none}"
          echo "Malformed (${#malformed[@]}): ${malformed[*]:-none}"

          {
              echo "added<<EOF"
              for s in "${added[@]}"; do echo "  - $s"; done
              echo "EOF"
              echo "failed<<EOF"
              for s in "${failed[@]}"; do echo "  - $s"; done
              echo "EOF"
              echo "added_count=${#added[@]}"
              echo "failed_count=${#failed[@]}"
              echo "malformed_count=${#malformed[@]}"
          } >> "$GITHUB_OUTPUT"

          if [[ ${#added[@]} -gt 0 ]]; then
              packwiz refresh
          fi

      - name: Commit and push
        if: steps.sync.outputs.added_count != '0'
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git add mods/ index.toml
          if git diff --cached --quiet; then
              echo "No staged changes"
              exit 0
          fi
          git commit -m "Sync wishlist: add ${{ steps.sync.outputs.added_count }} mod(s)

          Added:
          ${{ steps.sync.outputs.added }}

          Failed:
          ${{ steps.sync.outputs.failed }}

          Triggered by ${{ github.actor }} via wishlist update."
          git push

      - name: Fail run if any failures
        if: steps.sync.outputs.failed_count != '0' || steps.sync.outputs.malformed_count != '0'
        run: |
          echo "::error::Sync had failures or malformed lines. See log above."
          exit 1
