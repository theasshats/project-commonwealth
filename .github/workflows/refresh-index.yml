name: Auto-refresh packwiz index

# Keeps the packwiz-generated index in sync on a PR *without* the author having to
# remember `packwiz refresh`. The `pack` job in pr-checks.yml fails when index.toml /
# pack.toml drift after a tracked pack file changes (a kubejs script, a config, a
# manifest). That guard is correct, but the fix it asks for — "run packwiz refresh
# and commit" — is fully mechanical: `packwiz refresh` regenerates index.toml and
# only ever rewrites pack.toml's [index] hash, nothing else. So we automate it.
#
# This complements resolve-conflicts.yml, which only fires on push-to-main and
# PR open/reopen (the stacked-PR index *conflict*). The drift this heals is the
# other half: editing a pack file on a PR and pushing without refreshing — a
# `synchronize` event resolve-conflicts never sees.
#
# Triggers: a PR is opened, reopened, or gets new commits (synchronize).
#
# Safety:
#   - Fork PRs are skipped — the GITHUB_TOKEN can't push to another repo's branch
#     (those authors get the red freshness check and refresh by hand).
#   - We bail rather than commit if `packwiz refresh` somehow touched anything
#     other than index.toml / pack.toml — that would mean refresh is doing more
#     than we assume, and a human should look.
#
# No infinite loop: the auto-refresh commit is pushed with GITHUB_TOKEN, and pushes
# made with GITHUB_TOKEN do not trigger another `pull_request` run — so this fires
# at most once per author push. (Corollary: that bot commit won't itself re-run the
# other PR checks; making the freshness check a *required* gate for fully-hands-off
# merging needs a PAT/App token — a repo-secret decision, noted in docs/CI-CHECKS.md.)

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: refresh-index-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  refresh:
    name: refresh index if stale
    runs-on: ubuntu-latest
    # Same-repo PRs only — we can't push a fix to a fork's branch.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-packwiz

      - name: Refresh, and push the result only if the index drifted
        run: |
          set -euo pipefail
          packwiz refresh

          if git diff --quiet -- index.toml pack.toml; then
            echo "Index already fresh — nothing to do."
            exit 0
          fi

          # refresh must only ever touch the two generated files; if it changed
          # anything else, our assumption is wrong — leave it for a human.
          other="$(git diff --name-only -- . ':(exclude)index.toml' ':(exclude)pack.toml')"
          if [ -n "$other" ]; then
            echo "::error::packwiz refresh changed files beyond the index:"
            echo "$other"
            exit 1
          fi

          echo "Index was stale — committing the refresh."
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.toml pack.toml
          git commit -m "Auto-refresh packwiz index [skip ci]"

          for i in 1 2 3 4; do
            if git push origin "HEAD:${{ github.head_ref }}"; then exit 0; fi
            sleep $((2 ** i))
          done
          git push origin "HEAD:${{ github.head_ref }}"
