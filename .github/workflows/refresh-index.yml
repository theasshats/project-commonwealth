name: Auto-refresh packwiz index

# Keeps the packwiz-generated index in sync on a PR *without* the author having to
# remember `packwiz refresh`. The `pack` job in pr-checks.yml fails when index.toml /
# pack.toml drift after a tracked pack file changes (a kubejs script, a config, a
# manifest). That guard is correct, but the fix it asks for — "run packwiz refresh
# and commit" — is fully mechanical: `packwiz refresh` regenerates index.toml and
# only ever rewrites pack.toml's [index] hash, nothing else. So we automate it.
#
# This complements resolve-conflicts.yml, which only fires on push-to-main and
# PR open/reopen (the stacked-PR index *conflict*). The drift this heals is the
# other half: editing a pack file on a PR and pushing without refreshing — a
# `synchronize` event resolve-conflicts never sees.
#
# Triggers: a PR is opened, reopened, or gets new commits (synchronize).
#
# Safety:
#   - Fork PRs are skipped — the GITHUB_TOKEN can't push to another repo's branch
#     (those authors get the red freshness check and refresh by hand).
#   - We bail rather than commit if `packwiz refresh` somehow touched anything
#     other than index.toml / pack.toml — that would mean refresh is doing more
#     than we assume, and a human should look.
#   - We ONLY auto-commit pure *hash* drift (files already in the index, their
#     content edited). If refresh ADDS or REMOVES `[[files]]` entries we do NOT
#     touch it — that's the case the index-freshness check doubles as a
#     `.packwizignore` guard for (a new dir like `site/` getting vacuumed into the
#     index because nobody ignored it). Auto-committing that would silently defeat
#     the guard, so we leave the red check for a human, exactly as before.
#
# No infinite loop: the auto-refresh commit is pushed with GITHUB_TOKEN, and pushes
# made with GITHUB_TOKEN do not trigger another `pull_request` run — so this fires
# at most once per author push. (Corollary: that bot commit won't itself re-run the
# other PR checks; making the freshness check a *required* gate for fully-hands-off
# merging needs a PAT/App token — a repo-secret decision, noted in docs/CI-CHECKS.md.)

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: refresh-index-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  refresh:
    name: refresh index if stale
    runs-on: ubuntu-latest
    # Same-repo PRs only — we can't push a fix to a fork's branch.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-packwiz

      - name: Refresh, and push only a pure hash-drift result
        run: |
          set -euo pipefail

          # The committed index's file LIST (paths only, sorted) — before refresh.
          git show HEAD:index.toml | grep '^file = ' | sort > /tmp/files_before.txt

          packwiz refresh

          if git diff --quiet -- index.toml pack.toml; then
            echo "Index already fresh — nothing to do."
            exit 0
          fi

          # refresh must only ever touch the two generated files; if it changed
          # anything else, our assumption is wrong — leave it for a human.
          other="$(git diff --name-only -- . ':(exclude)index.toml' ':(exclude)pack.toml')"
          if [ -n "$other" ]; then
            echo "::error::packwiz refresh changed files beyond the index:"
            echo "$other"
            exit 1
          fi

          # GUARD: only auto-commit when the index's file LIST is unchanged — i.e.
          # the drift is purely the `hash` of files already indexed (someone edited a
          # tracked pack file but forgot to refresh). If refresh ADDED or REMOVED
          # `[[files]]` entries, that's structural: a new mod/script — or, crucially,
          # a new directory that should have been added to `.packwizignore` and wasn't
          # (e.g. `site/` getting vacuumed in). Auto-committing that would silently
          # defeat the `.packwizignore` guard, so we DON'T: we leave the working tree
          # dirty and exit, letting pr-checks' red "packwiz index" check surface it for
          # a human (the exact behaviour before this workflow existed).
          grep '^file = ' index.toml | sort > /tmp/files_after.txt
          if ! diff -q /tmp/files_before.txt /tmp/files_after.txt >/dev/null; then
            echo "::warning::Index file list changed (entries added/removed), not just hashes."
            echo "Not auto-committing — this can mean a new dir needs a .packwizignore entry,"
            echo "or new content that warrants a human eyeballing the index. Added/removed:"
            diff /tmp/files_before.txt /tmp/files_after.txt || true
            exit 0
          fi

          echo "Pure hash drift on already-indexed files — committing the refresh."
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.toml pack.toml
          git commit -m "Auto-refresh packwiz index [skip ci]"

          for i in 1 2 3 4; do
            if git push origin "HEAD:${{ github.head_ref }}"; then exit 0; fi
            sleep $((2 ** i))
          done
          git push origin "HEAD:${{ github.head_ref }}"
