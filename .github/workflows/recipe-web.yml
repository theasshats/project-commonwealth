name: Regenerate recipe web

# Rebuilds the interactive connectivity viz (tools/recipe-graph/recipe-web.html) and refreshes the
# data block in docs/CONNECTIVITY.md whenever the recipes, digests, or the tooling change. The result
# is committed back to main with a [skip ci] tag to prevent loops (same pattern as build-editor.yml).

on:
  push:
    branches: [main]
    paths:
      - 'kubejs/server_scripts/recipes/**'
      - 'tools/mod-data/recipes/**'
      - 'tools/mod-data/loot/**'
      - 'tools/recipe-graph/**'
      - '.github/workflows/recipe-web.yml'
  workflow_dispatch: {}  # manual trigger

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate viz + connectivity data
        run: |
          set -euo pipefail
          python3 tools/recipe-graph/recipe-graph-viz.py
          # rewrite the data block under the marker in docs/CONNECTIVITY.md
          MARKER='<!-- DATA: regenerate with `python3 tools/recipe-graph/recipe-graph.py` -->'
          python3 - "$MARKER" <<'PY'
          import sys
          p = 'docs/CONNECTIVITY.md'; marker = sys.argv[1]
          head = open(p, encoding='utf-8').read().split(marker)[0]
          open(p, 'w', encoding='utf-8').write(head + marker + '\n\n')
          PY
          python3 tools/recipe-graph/recipe-graph.py >> docs/CONNECTIVITY.md

      - name: Commit if changed
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          git add tools/recipe-graph/recipe-web.html docs/CONNECTIVITY.md
          if git diff --cached --quiet; then
            echo "No viz/connectivity changes."
          else
            git commit -m "Regenerate recipe web + connectivity data [skip ci]

          Triggered by ${{ github.event.head_commit.message || 'manual run' }}
          Source SHA: ${{ github.sha }}"
            git push
          fi
