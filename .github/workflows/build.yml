name: Build modpack

# Builds the two release artifacts (.mrpack and Prism installer zip) and
# attaches them to GitHub releases. Both artifacts are small (~5 MB total)
# since they ship only manifests, not jars — launchers fetch jars at install
# time from each mod's authoritative source.
#
# The build is fast (~30 seconds end to end) so there's no caching layer.
# We had one in an earlier iteration when bundled-jar zips made builds slow,
# but dropped it once we stopped distributing jars. See docs/DESIGN.md.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out main rather than the tagged commit, so the version-bump
          # commit goes on top of main rather than rolling it back.
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java (for packwiz-installer-bootstrap)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up packwiz
        uses: ./.github/actions/setup-packwiz

      # When triggered by a release, force pack.toml's version to match the
      # tag. Tag v0.3.3 -> pack.toml version "0.3.3". Skipped on
      # workflow_dispatch (manual test builds).
      #
      # The commit-and-push side effect is needed for the installer variant,
      # which fetches pack.toml from main at every client launch.
      - name: Sync pack.toml version with release tag
        if: github.event_name == 'release'
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          tag="${{ github.event.release.tag_name }}"
          target_version="${tag#v}"

          current_version=$(grep -E '^version\s*=' pack.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')

          if [[ "$current_version" == "$target_version" ]]; then
              echo "==> pack.toml already at version $target_version, nothing to sync"
              exit 0
          fi

          echo "==> Bumping pack.toml: $current_version -> $target_version"
          sed -i -E "s/^version\s*=\s*\".*\"/version = \"${target_version}\"/" pack.toml
          packwiz refresh

          git add pack.toml index.toml
          git commit -m "Bump version to ${target_version} for release ${tag}"
          git push origin HEAD:main

      - name: Refresh packwiz index
        run: packwiz refresh --build

      - name: Read pack metadata
        id: meta
        run: |
          version=$(grep -E '^version\s*=' pack.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          name=$(grep -E '^name\s*=' pack.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          slug=$(echo "$name" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g; s/--*/-/g; s/^-//; s/-$//')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      # 1. .mrpack — Modrinth's pack format
      - name: Build .mrpack
        run: |
          mkdir -p dist
          packwiz mr export -o "dist/${{ steps.meta.outputs.slug }}-${{ steps.meta.outputs.version }}.mrpack"

      # 2. Prism installer zip — small Prism instance that runs
      # packwiz-installer-bootstrap on every launch to fetch jars from
      # Modrinth/CurseForge.
      #
      # We don't ship a bundled-jars zip (mod redistribution licensing) and
      # don't ship a server pack (servers run the same bootstrap directly with
      # `-s server`). See docs/DESIGN.md.
      - name: Build Prism instance (installer)
        env:
          PACK_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/pack.toml
        run: bash scripts/build-prism-installer.sh

      - name: Clean staging from dist
        run: rm -rf dist/staging

      - name: List final artifacts
        run: ls -lh dist/

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.mrpack
            dist/*.zip
          tag_name: ${{ github.event.release.tag_name }}
          fail_on_unmatched_files: true
