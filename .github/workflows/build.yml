name: Build modpack

# Builds the release artifact (the Prism installer zip) and attaches it to a
# GitHub release. It's small (~5 MB) since it ships only manifests, not jars —
# launchers fetch jars at install time from each mod's authoritative source.
#
# We no longer ship a .mrpack: packwiz's mr export bundles the overrides/ tree
# (config, kubejs, resourcepacks…) so it had bloated to ~200 MB, nobody on the
# friend-group server used it, and the installer is the recommended path. See
# issue #73 and docs/DESIGN.md.
#
# The build is fast (~30 seconds end to end) so there's no caching layer.
#
# Triggers:
#   - workflow_call  — invoked by release.yml on a version bump; passes the tag
#     to publish under (this is the auto-release path).
#   - release:published — a release created by hand in the GitHub UI still builds
#     and uploads (legacy/manual path).
#   - workflow_dispatch — manual test build, no release (tag input left empty).
#     Builds the BRANCH it's dispatched from (not main) and uploads the installer
#     zip as a downloadable workflow artifact, so you can playtest a version
#     branch (e.g. v0.7.0) without merging it to main first.
#
# Version-first model: pack.toml's `version` is the source of truth and drives
# the tag (release.yml). The old "sync pack.toml from the release tag" step was
# removed — the tag now follows the file, not the other way around.

on:
  workflow_call:
    inputs:
      tag:
        description: 'Version tag to publish the release under (e.g. v0.5.4). Empty = build only.'
        type: string
        required: false
        default: ''
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Resolve which ref to build from. The release paths (workflow_call from
      # release.yml, and the release:published event) build main's tip — the
      # merge commit that bumped the version, not a detached tag commit. A manual
      # workflow_dispatch instead builds the branch it was dispatched on, so you
      # can produce a test installer for a version branch (e.g. v0.7.0) before it
      # merges to main.
      - name: Resolve build ref
        id: ref
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ref="${{ github.ref_name }}"
          else
            ref="main"
          fi
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "==> building from ref: ${ref}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # Resolve which tag (if any) this build should publish a release under:
      # the workflow_call input, else the release event's tag, else none.
      - name: Resolve release tag
        id: tag
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            tag="${{ inputs.tag }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag=""
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "==> release tag: ${tag:-<none, build only>}"

      - name: Set up Java (for packwiz-installer-bootstrap)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up packwiz
        uses: ./.github/actions/setup-packwiz

      - name: Refresh packwiz index
        run: packwiz refresh --build

      # Prism installer zip — small Prism instance that runs
      # packwiz-installer-bootstrap on every launch to fetch jars from
      # Modrinth/CurseForge.
      - name: Build Prism instance (installer)
        env:
          # Bake in the same ref we built from, so a dispatched branch build's
          # instance fetches that branch's pack.toml at launch (main for releases).
          PACK_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.ref.outputs.ref }}/pack.toml
        run: bash scripts/build-prism-installer.sh

      - name: Clean staging from dist
        run: rm -rf dist/staging

      # Publish a stable, version-less copy alongside the versioned artifact so
      # the website (and anyone else) can link to a permanent "latest" download:
      #   .../releases/latest/download/project-commonwealth-prism-installer.zip
      - name: Add stable-named copy for permanent latest-download link
        run: |
          cd dist
          cp "$(ls *-prism-installer-*.zip | head -1)" project-commonwealth-prism-installer.zip

      - name: List final artifacts
        run: ls -lh dist/

      # On a build-only run (manual workflow_dispatch — no tag) there's no
      # release to attach the zip to, so upload it as a downloadable workflow
      # artifact instead. Release runs skip this — the zip is already a release
      # asset. Pairs with the dispatch "build the triggering branch" behavior
      # above to give a downloadable test installer for a version branch.
      - name: Upload installer artifact (build-only runs)
        if: steps.tag.outputs.tag == ''
        uses: actions/upload-artifact@v4
        with:
          name: prism-installer
          path: dist/*-prism-installer-*.zip
          if-no-files-found: error
          retention-days: 14

      # Pull the release body from docs/PATCHNOTES.md — the "## X.Y.Z …" section
      # for this version, up to the next "## ". Falls back to a placeholder if the
      # section is missing or still the auto-staged stub (so a forgotten patch note
      # is visible in the release rather than blocking it). Keep PATCHNOTES current
      # on the release branch — see CLAUDE.md.
      - name: Extract patch notes for the release body
        id: notes
        if: steps.tag.outputs.tag != ''
        run: |
          ver="${{ steps.tag.outputs.tag }}"; ver="${ver#v}"
          notes=/tmp/release-notes.md
          awk -v v="$ver" '
            (index($0, "## " v " ") == 1) || ($0 == "## " v) { grab=1; print; next }
            grab && /^## / { exit }
            grab { print }
          ' docs/PATCHNOTES.md > "$notes" || true
          if [ ! -s "$notes" ] || grep -qiE 'Draft placeholder|— TBD' "$notes"; then
            echo "::warning::no finalized patch notes for ${ver} in docs/PATCHNOTES.md"
            printf '## %s\n\nRelease notes were not finalized in `docs/PATCHNOTES.md` for this version.\n' "$ver" > "$notes"
          fi
          echo "----- release body -----"; cat "$notes"
          echo "path=$notes" >> "$GITHUB_OUTPUT"

      # Publish (or update) the release for the resolved tag and attach the zips.
      # action-gh-release creates the tag + release if they don't exist yet
      # (the auto-release path), or updates an existing one (manual UI release).
      - name: Publish release
        if: steps.tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: main
          body_path: ${{ steps.notes.outputs.path }}
          fail_on_unmatched_files: true
