name: Build modpack

on:
  push:
    tags:
      - 'v*'
  release:
    types: [created, published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Refresh packwiz index
        run: packwiz refresh --build

      - name: Read pack version
        id: meta
        run: |
          version=$(grep -E '^version\s*=' pack.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          name=$(grep -E '^name\s*=' pack.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g; s/--*/-/g; s/^-//; s/-$//')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "artifact=$name-$version.mrpack" >> "$GITHUB_OUTPUT"

      - name: Export Modrinth pack
        run: |
          mkdir -p dist
          packwiz mr export -o "dist/${{ steps.meta.outputs.artifact }}"

      - name: Build server pack
        run: bash scripts/build-server.sh

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.version }}
          path: dist/

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.mrpack
            dist/*.zip
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
