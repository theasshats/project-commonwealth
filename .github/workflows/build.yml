name: Build modpack

on:
  push:
    tags:
      - 'v*'
  release:
    types: [created, published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java (for packwiz-installer-bootstrap)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Go (for packwiz)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Refresh packwiz index
        run: packwiz refresh --build

      - name: Read pack metadata
        id: meta
        run: |
          version=$(grep -E '^version\s*=' pack.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          name=$(grep -E '^name\s*=' pack.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          slug=$(echo "$name" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g; s/--*/-/g; s/^-//; s/-$//')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      # 1. .mrpack — small, references mods by URL
      - name: Build .mrpack
        run: |
          mkdir -p dist
          packwiz mr export -o "dist/${{ steps.meta.outputs.slug }}-${{ steps.meta.outputs.version }}.mrpack"

      # 2. Prism (bundled jars) — fat zip, friend imports and plays
      - name: Build Prism instance (bundled)
        run: bash scripts/build-prism-bundled.sh

      # 3. Prism (installer) — thin zip, fetches mods on launch
      - name: Build Prism instance (installer)
        env:
          # Bake the raw URL of pack.toml at this tag into the instance.
          # github.ref_name is the tag (e.g. v0.1.0); release events also expose this.
          PACK_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.event.release.tag_name || github.ref_name }}/pack.toml
        run: bash scripts/build-prism-installer.sh

      # 4. Server pack — configs + fetch-mods.sh + run.sh
      - name: Build server pack
        run: bash scripts/build-server.sh

      - name: Clean staging from dist
        run: rm -rf dist/staging

      - name: List artifacts
        run: ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.slug }}-${{ steps.meta.outputs.version }}
          path: dist/

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.mrpack
            dist/*.zip
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
