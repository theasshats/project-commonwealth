name: Prune merged branch

# Auto-delete a PR's head branch once the PR is merged, so short-lived topic /
# session branches (claude/*, topic branches) don't pile up. The maintainer can't
# delete branches from the Claude Code sandbox (the git proxy 403s on ref deletes),
# so CI does it here with the permissions it has. Long-lived branches are kept:
# main, version branches (v*), and *-DEV integration branches. See #105.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  prune:
    # Only for merged PRs whose head branch lives in this repo (not forks).
    if: github.event.pull_request.merged == true && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged head branch
        uses: actions/github-script@v7
        with:
          script: |
            const ref = context.payload.pull_request.head.ref;
            // Keep long-lived branches: default, version branches, and *-DEV integration branches.
            if (ref === 'main' || /^v\d/.test(ref) || ref.endsWith('-DEV')) {
              core.info(`Keeping long-lived branch: ${ref}`);
              return;
            }
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${ref}`,
              });
              core.info(`Deleted merged branch: ${ref}`);
            } catch (e) {
              core.warning(`Could not delete ${ref}: ${e.message}`);
            }
