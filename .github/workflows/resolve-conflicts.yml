name: Auto-resolve regenerable conflicts

# Comment `/resolve-conflicts` on a PR and this merges the latest `main` into the
# PR branch, auto-resolving the conflicts that are *meaningless to resolve by
# hand*: the packwiz-generated files. `index.toml` is rebuilt by `packwiz
# refresh`, and the only field `refresh` ever touches in `pack.toml` is the
# `[index]` hash — so when two PRs both add/remove mods they collide there, but
# the "resolution" is never to pick a side, it's to regenerate from the merged
# content.
#
# Safety: it ONLY auto-resolves when every conflicting file is regenerable.
#   - index.toml          -> always regenerable (rebuilt wholesale by refresh)
#   - pack.toml           -> regenerable ONLY if the two sides differ solely in
#                            the [index] hash line (i.e. nobody touched version /
#                            minecraft / neoforge). If they differ anywhere else,
#                            that's a real human decision and we bail.
# Any other conflicting file (mods/*.pw.toml both edited, kubejs, config, …) is a
# genuine content conflict — the merge is aborted and a human is asked to resolve.
#
# Note: GitHub runs `issue_comment` workflows from the file on the DEFAULT branch,
# so this only takes effect once merged to main.

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr:
        description: 'PR number to resolve'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: resolve-conflicts-${{ github.event.issue.number || github.event.inputs.pr }}
  cancel-in-progress: false

jobs:
  resolve:
    # Comment must be on a PR and contain the command; or a manual dispatch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.pull_request &&
       contains(github.event.comment.body, '/resolve-conflicts') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR: ${{ github.event.issue.number || github.event.inputs.pr }}
    steps:
      - name: Resolve PR head branch
        id: pr
        run: |
          head_ref="$(gh pr view "$PR" --repo "$GITHUB_REPOSITORY" --json headRefName -q .headRefName)"
          head_repo="$(gh pr view "$PR" --repo "$GITHUB_REPOSITORY" --json headRepositoryOwner -q .headRepositoryOwner.login)"
          echo "head_ref=$head_ref" >> "$GITHUB_OUTPUT"
          echo "head_repo=$head_repo" >> "$GITHUB_OUTPUT"
          if [ "$head_repo" != "${GITHUB_REPOSITORY%%/*}" ]; then
            echo "::error::PR is from a fork ($head_repo); cannot push a resolution to it."
            gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" \
              --body "🤖 Can't auto-resolve: this PR is from a fork, so I can't push the regenerated index back to its branch."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-packwiz

      - name: Merge main, auto-resolving only regenerable conflicts
        id: merge
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          if git merge --no-commit --no-ff origin/main; then
            echo "Merge was clean — no conflicts to resolve."
            # Still refresh in case the merged content drifts the index.
            packwiz refresh
            if git diff --quiet && git diff --cached --quiet; then
              echo "result=clean-nochange" >> "$GITHUB_OUTPUT"
              git merge --abort || true
              exit 0
            fi
            git add -A
            git commit -m "Merge main into PR branch; refresh packwiz index"
            echo "result=clean" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # We have conflicts. Inspect them.
          mapfile -t conflicts < <(git diff --name-only --diff-filter=U)
          echo "Conflicting files: ${conflicts[*]}"
          real_conflicts=()
          for f in "${conflicts[@]}"; do
            case "$f" in
              index.toml)
                : ;;  # fully regenerable
              pack.toml)
                # Regenerable only if the sides differ solely in the [index] hash line.
                ours_norm="$(git show :2:pack.toml | grep -v '^hash = ' || true)"
                theirs_norm="$(git show :3:pack.toml | grep -v '^hash = ' || true)"
                if [ "$ours_norm" != "$theirs_norm" ]; then
                  real_conflicts+=("$f")
                fi ;;
              *)
                real_conflicts+=("$f") ;;
            esac
          done

          if [ "${#real_conflicts[@]}" -gt 0 ]; then
            echo "result=manual" >> "$GITHUB_OUTPUT"
            printf '%s\n' "${real_conflicts[@]}" > /tmp/real_conflicts.txt
            git merge --abort
            exit 0
          fi

          # Every conflict is regenerable. Take our side for the generated files
          # (pack.toml's non-hash content is identical; index.toml is rebuilt
          # wholesale next), then regenerate from the merged content.
          git checkout --ours -- pack.toml index.toml
          git add pack.toml index.toml
          packwiz refresh
          git add -A
          git commit -m "Merge main; regenerate packwiz index (auto-resolve conflicts)"
          echo "result=resolved" >> "$GITHUB_OUTPUT"

      - name: Push resolution
        if: steps.merge.outputs.result == 'resolved' || steps.merge.outputs.result == 'clean'
        run: |
          for i in 1 2 3 4; do
            if git push origin HEAD:${{ steps.pr.outputs.head_ref }}; then exit 0; fi
            sleep $((2 ** i))
          done
          git push origin HEAD:${{ steps.pr.outputs.head_ref }}

      - name: Report outcome
        if: always()
        run: |
          case "${{ steps.merge.outputs.result }}" in
            resolved)
              gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" \
                --body "🤖 Auto-resolved the packwiz index conflict: merged \`main\` and regenerated \`index.toml\` / \`pack.toml\` from the combined mod list. Re-running PR checks." ;;
            clean)
              gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" \
                --body "🤖 \`main\` merged cleanly into this branch (no conflicts); refreshed the index to be safe." ;;
            clean-nochange)
              gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" \
                --body "🤖 Already up to date with \`main\` — nothing to resolve." ;;
            manual)
              files="$(sed 's/^/- `/; s/$/`/' /tmp/real_conflicts.txt)"
              gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" \
                --body "$(printf '🤖 I can only auto-resolve the packwiz-generated files (\`index.toml\` and the \`pack.toml\` index hash). These conflicts are real content changes and need a human:\n\n%s\n\nResolve them locally, then comment `/resolve-conflicts` again if the index still collides.' "$files")" ;;
            *)
              gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" \
                --body "🤖 Auto-resolve run failed before it could finish — check the [workflow run]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)." ;;
          esac
