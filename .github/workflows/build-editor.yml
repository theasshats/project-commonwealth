name: Build editor

# Auto-builds tools/pcmc-edit.exe whenever the editor source changes. It just
# compiles the editor (cross-compiled for windows/amd64), embedding the COMMITTED
# tools/editor-src/internal/packwiz/assets/packwiz.bin via go:embed — we no longer
# rebuild packwiz from source on every run. packwiz rarely changes; bump packwiz.bin
# manually when it needs it (see CLAUDE.md). The compiled binary is committed back to
# main with a [skip ci] tag to prevent infinite loops.

on:
  push:
    branches: [main]
    paths:
      - 'tools/editor-src/**'
      - '.github/workflows/build-editor.yml'
  workflow_dispatch: {}  # manual trigger (e.g. to build the .exe on a PR branch)

permissions:
  contents: write

# Cancel a superseded build of the same ref — only the latest source matters.
concurrency:
  group: build-editor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: tools/editor-src/go.sum

      - name: Build editor binary
        working-directory: tools/editor-src
        run: |
          set -euo pipefail
          # Cross-compile for Windows. Embeds the committed assets/packwiz.bin
          # (see CLAUDE.md for how/when to bump packwiz itself).
          GOOS=windows GOARCH=amd64 go build \
            -o ../pcmc-edit.exe \
            -ldflags="-s -w" \
            .
          ls -lh ../pcmc-edit.exe

      - name: Check if binary changed
        id: check
        run: |
          # Stage the file first so `git diff --cached` can compare it against
          # whatever's currently in the index. This handles the first-build
          # case correctly (where the file doesn't exist in HEAD yet).
          git add tools/pcmc-edit.exe
          if git diff --cached --quiet -- tools/pcmc-edit.exe; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Binary unchanged, skipping commit"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Binary changed (or new), will commit"
            ls -lh tools/pcmc-edit.exe
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          # Already staged in the previous step.
          git commit -m "Rebuild pcmc-edit.exe [skip ci]

          Triggered by ${{ github.event.head_commit.message || 'manual rebuild' }}
          Source SHA: ${{ github.sha }}"
          git push
