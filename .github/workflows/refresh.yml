name: Refresh pack index

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install packwiz
        run: |
          curl -fsSL https://github.com/packwiz/packwiz/releases/latest/download/packwiz-linux-amd64.zip -o packwiz.zip
          unzip packwiz.zip
          chmod +x packwiz

      - name: Refresh
        run: ./packwiz refresh

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Refresh pack index"
            git push
          else
            echo "No changes to commit."
          fi
