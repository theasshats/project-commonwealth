name: Add mod(s)

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Where to fetch from (applies to all slugs in this run)'
        required: true
        type: choice
        options:
          - modrinth
          - curseforge
        default: modrinth
      slugs:
        description: 'Mod slug(s). One slug, or comma-separated list (e.g. "jei,jade,sophisticated-backpacks")'
        required: true
        type: string
      side:
        description: 'Which sides need these mods (applies to all)'
        required: true
        type: choice
        options:
          - both
          - client
          - server
        default: both

permissions:
  contents: write

jobs:
  add-mods:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up packwiz
        uses: ./.github/actions/setup-packwiz

      - name: Add mods
        id: add
        run: |
          case "${{ inputs.source }}" in
            modrinth)   cmd="mr" ;;
            curseforge) cmd="cf" ;;
          esac
          side='${{ inputs.side }}'

          # Split comma-separated slugs, trim whitespace
          IFS=',' read -ra SLUGS <<< '${{ inputs.slugs }}'

          succeeded=()
          failed=()

          for raw_slug in "${SLUGS[@]}"; do
              slug="$(echo "$raw_slug" | xargs)"  # trim
              [[ -z "$slug" ]] && continue

              echo ""
              echo "==> packwiz $cmd add $slug (side=$side)"

              if packwiz "$cmd" add "$slug" --yes 2>&1 | tee /tmp/add.log; then
                  if ls "mods/${slug}.pw.toml" >/dev/null 2>&1; then
                      if [[ "$side" != "both" ]]; then
                          sed -i "s/^side = \".*\"/side = \"${side}\"/" "mods/${slug}.pw.toml"
                      fi
                      succeeded+=("$slug")
                      echo "    ok"
                  else
                      failed+=("$slug (packwiz reported success but no mods/${slug}.pw.toml exists)")
                      echo "    UNEXPECTED: command succeeded but no manifest file"
                  fi
              else
                  failed+=("$slug")
                  echo "    FAILED"
              fi
          done

          # Summary
          echo ""
          echo "========================================"
          echo "Summary"
          echo "========================================"
          echo "Succeeded (${#succeeded[@]}): ${succeeded[*]:-none}"
          echo "Failed    (${#failed[@]}): ${failed[*]:-none}"

          # Save to outputs for the commit message
          {
              echo "succeeded<<EOF"
              for s in "${succeeded[@]}"; do echo "  - $s"; done
              echo "EOF"
              echo "failed<<EOF"
              for s in "${failed[@]}"; do echo "  - $s"; done
              echo "EOF"
              echo "succeeded_count=${#succeeded[@]}"
              echo "failed_count=${#failed[@]}"
          } >> "$GITHUB_OUTPUT"

          # Always refresh so the index reflects whatever did get added
          if [[ ${#succeeded[@]} -gt 0 ]]; then
              packwiz refresh
          fi

      - name: Commit and push
        if: steps.add.outputs.succeeded_count != '0'
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git add mods/ index.toml
          if git diff --cached --quiet; then
              echo "No staged changes (nothing to commit)"
              exit 0
          fi
          git commit -m "Add ${{ steps.add.outputs.succeeded_count }} mod(s) from ${{ inputs.source }}

          Succeeded:
          ${{ steps.add.outputs.succeeded }}

          Failed:
          ${{ steps.add.outputs.failed }}

          Triggered by ${{ github.actor }}, side=${{ inputs.side }}."
          git push

      - name: Fail run if any slugs failed
        if: steps.add.outputs.failed_count != '0'
        run: |
          echo "::error::${{ steps.add.outputs.failed_count }} slug(s) failed to add. See log above."
          exit 1
