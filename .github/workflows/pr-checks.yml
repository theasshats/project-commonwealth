name: PR checks

# Merge-gating validation for pull requests. Catches the mistakes that break the
# pack at install/update time: a misplaced `pin`, an invalid manifest, broken
# KubeJS JSON/JS, a bad config TOML, or a non-compiling Go change in the editor —
# plus the **packwiz index** guard, which is *guard-aware*: it fails only on
# a new top-level path that needs a .packwizignore entry. Routine staleness (forgot
# `packwiz refresh`) is auto-fixed by sync-index, so the check stays green and never
# flickers red. The two share one verdict (scripts/index-guard.sh).
#
# See docs/CI-CHECKS.md for what each job does and how to make these *required*
# via a branch-protection ruleset (a repo setting, not committable here).

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pack:
    name: packwiz index
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-packwiz

      # Guard-aware (see scripts/index-guard.sh — the same script sync-index uses):
      # passes when the index is fresh OR only stale within known pack dirs (which
      # sync-index auto-commits for you), and goes RED only when `packwiz refresh`
      # would pull in a NEW top-level path that needs a .packwizignore entry. Because
      # the checker and the fixer share one verdict, routine staleness never flickers
      # red — only the one case a human must resolve does.
      - name: packwiz index is fresh or auto-fixable
        run: |
          verdict="$(bash scripts/index-guard.sh)"
          echo "verdict: $verdict — routine staleness is auto-committed by sync-index; red only on a new un-ignored path."

  manifests:
    name: manifest lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/lint-manifests.py

  data:
    name: kubejs / config data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: KubeJS JavaScript syntax (node --check)
        run: |
          mapfile -t files < <(find kubejs -name '*.js')
          if [ "${#files[@]}" -gt 0 ]; then
            for f in "${files[@]}"; do node --check "$f"; done
          fi
          echo "${#files[@]} JS file(s) OK"

      - name: JSON & config TOML parse
        run: python3 scripts/validate-data.py

  go:
    name: go build & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: editor (packwiz.bin is committed)
        working-directory: tools/editor-src
        run: |
          go build ./...
          go vet ./...
