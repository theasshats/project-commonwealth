name: Compute hash

# Reads the URL from mods/<slug>.pw.toml, downloads the file, computes its
# SHA-512 hash, and writes the new hash back into the manifest. Useful when
# you've manually edited a manifest (especially a pinned one) to point at a
# different URL/version, since the existing hash no longer matches.

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Mod slug (filename of the .pw.toml under mods/, without extension)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  compute-hash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up packwiz
        uses: ./.github/actions/setup-packwiz

      - name: Resolve manifest and URL
        id: resolve
        run: |
          slug='${{ inputs.slug }}'
          slug="$(echo -n "$slug" | xargs)"
          manifest="mods/${slug}.pw.toml"

          if [[ ! -f "$manifest" ]]; then
            echo "::error::$manifest not found"
            echo "Available manifests:"
            ls mods/*.pw.toml 2>/dev/null | sed 's|mods/||;s|\.pw\.toml$||' | head -50
            exit 1
          fi

          # Extract the url field from under [download]
          url="$(awk '
            /^\[download\]/ { in_dl=1; next }
            /^\[/ && !/^\[download\]/ { in_dl=0 }
            in_dl && /^url *=/ {
              sub(/^url *= *"/, "")
              sub(/" *$/, "")
              print
              exit
            }
          ' "$manifest")"

          if [[ -z "$url" ]]; then
            echo "::error::No url field found under [download] in $manifest"
            exit 1
          fi

          echo "Manifest: $manifest"
          echo "URL: $url"
          echo "manifest=$manifest" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Download and hash
        id: hash
        run: |
          url='${{ steps.resolve.outputs.url }}'
          tmp="$(mktemp)"

          if ! curl -fsSL "$url" -o "$tmp"; then
            echo "::error::Download failed for $url"
            rm -f "$tmp"
            exit 1
          fi

          size=$(stat -c%s "$tmp")
          hash="$(sha512sum "$tmp" | awk '{print $1}')"
          rm -f "$tmp"

          echo "Downloaded $size bytes"
          echo "SHA-512: $hash"
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

          {
            echo "## Computed hash"
            echo ""
            echo "**Slug:** \`${{ inputs.slug }}\`"
            echo ""
            echo "**URL:** \`$url\`"
            echo ""
            echo "**Size:** $size bytes"
            echo ""
            echo "**SHA-512:**"
            echo ""
            echo "\`\`\`"
            echo "$hash"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update manifest
        run: |
          manifest='${{ steps.resolve.outputs.manifest }}'
          new_hash='${{ steps.hash.outputs.hash }}'

          # Replace hash and hash-format under [download], section-scoped
          tmp="$(mktemp)"
          awk -v new_hash="$new_hash" '
            /^\[download\]/ { in_dl=1; print; next }
            /^\[/ && !/^\[download\]/ { in_dl=0; print; next }
            in_dl && /^hash *=/ {
              print "hash = \"" new_hash "\""
              next
            }
            in_dl && /^hash-format *=/ {
              print "hash-format = \"sha512\""
              next
            }
            { print }
          ' "$manifest" > "$tmp"
          mv "$tmp" "$manifest"

          echo "Updated $manifest:"
          grep -E '^(hash|hash-format) *=' "$manifest" || echo "(no hash fields found — manifest may be malformed)"

      - name: Refresh index
        run: packwiz refresh

      - name: Commit and push
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git add mods/ index.toml
          if git diff --cached --quiet; then
            echo "No changes to commit (hash already matched)"
            exit 0
          fi
          git commit -m "Compute hash: ${{ inputs.slug }}

          New SHA-512: ${{ steps.hash.outputs.hash }}

          Triggered by ${{ github.actor }} via Compute hash workflow."
          git push
