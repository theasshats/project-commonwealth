# Add this service to /home/media stack/docker-compose.yml.
# It replaces the brief's nginx:alpine block — same role (an upstream Caddy
# reverse-proxies by name), but it's our Go binary instead, so it builds from
# source rather than pulling nginx. Everything else follows the brief:
# no ports (Caddy reaches it internally), no networks key (it joins the
# external `media` network by default), no PUID/PGID.
#
# Put the contents of the repo's site/ directory at /home/media stack/modpack/
# so the build context below resolves.

  modpack:
    build: ./modpack
    image: derpack-site:latest
    container_name: modpack
    restart: unless-stopped
    environment:
      # Game server to ping for the live status badge. Keep in sync with the
      # actual connect address; falls back gracefully if unreachable.
      - MC_ADDR=mc.ishimura.xyz:25565
      # - LISTEN_ADDR=:8080   # default (non-root binds high; Caddy proxies here)
