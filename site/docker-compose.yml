# Standalone compose for the Derpack X player site — its OWN project, NOT part
# of the media-stack compose file. It only *attaches* to the existing external
# `media` network so Caddy can still reach it by name (`modpack:8080`); it isn't
# managed alongside the media services.
#
# Deploy from this directory:  docker compose up -d --build
# (The `media` network must already exist — it's created by the media stack.)
services:
  modpack:
    build: .
    image: derpack-site:latest
    container_name: modpack          # the name Caddy reverse-proxies to
    restart: unless-stopped
    environment:
      # Game server to ping for the live status badge; degrades gracefully.
      - MC_ADDR=mc.ishimura.xyz:25565
      # - LISTEN_ADDR=:8080          # default (non-root binds high; Caddy proxies here)
    networks:
      - media
    # No `ports:` — Caddy reaches it internally over the shared network.

networks:
  media:
    external: true
