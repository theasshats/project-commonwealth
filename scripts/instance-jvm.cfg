# Single source of truth for the Prism instance's JVM args + heap.
#
# These lines are spliced verbatim into instance.cfg's [General] section by BOTH
# builders, so they can never drift (same pattern as scripts/instance-dirs.txt):
#   - scripts/build-prism-skeleton.sh   (installer / CI release builds)
#   - tools/editor-src/internal/builder/builder.go  (the editor's "Build")
# Change the JVM flags / heap HERE and nowhere else.
#
# Each non-comment line is a `key=value` exactly as it appears in instance.cfg;
# comments (#) and blank lines are ignored.
#
# NOTE: these only reach a *fresh* install. The editor's "Build & Launch" syncs
# mods + override dirs into an existing instance and does NOT overwrite its
# instance.cfg, so existing players must hand-edit or reinstall to pick up a
# change here. See docs/PRISM-SETUP.md.
#
# Current: Aikar's flags, G1GC, 8 GB min / 12 GB max, 50 ms pause target. (RAM/GC tuning: #48.)
JvmArgs=-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=50 -XX:+UnlockExperimentalVMOptions -XX:+DisableExplicitGC -XX:+AlwaysPreTouch -XX:G1NewSizePercent=30 -XX:G1MaxNewSizePercent=40 -XX:G1HeapRegionSize=8M -XX:G1ReservePercent=20 -XX:G1HeapWastePercent=5 -XX:G1MixedGCCountTarget=4 -XX:InitiatingHeapOccupancyPercent=15 -XX:G1MixedGCLiveThresholdPercent=90 -XX:G1RSetUpdatingPauseTimePercent=5 -XX:SurvivorRatio=32 -XX:+PerfDisableSharedMem -XX:MaxTenuringThreshold=1
MaxMemAlloc=12288
MinMemAlloc=8192
